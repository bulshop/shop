<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaliBul</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_.png">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        .bg-image {
            background-image: url('Gemini_Generated_Image_.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
        }

        .form-container {
            /* עיצוב שקיפות נעים שבדקנו קודם */
            background-color: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px 16px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        .form-container h2 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .horizontal-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            justify-content: center;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .submit-btn {
            background-color: #007bff;
            color: white;
            padding: 8px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            height: 38px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            .horizontal-form { flex-direction: column; }
            .submit-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="form-container">
            <h2>השאירו פרטים ונחזור אליכם</h2>
            
            <form class="horizontal-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="form-group">
                    <label for="name">שם מלא:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">כתובת אימייל:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="submit-btn">שליחה</button>
            </form>
        </div>
    </div>

</body>
</html>
